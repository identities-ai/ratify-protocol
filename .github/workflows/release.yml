name: Release

# Tag-driven publishing. Push a tag matching v* (e.g. v1.0.0-alpha.6) and this
# workflow runs the full CI matrix, then publishes each SDK to its registry
# only if all tests pass. Per-SDK publish steps are conditional and continue
# on individual failure so a partial failure on one registry doesn't block
# the others. See docs/RELEASES.md for the full release process and how to
# recover from partial-publish states.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for cases where the tag-push didn't fire (e.g. bypassed
  # branch protection). Pass the exact tag to publish, e.g. v1.0.0-alpha.8.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0-alpha.8)'
        required: true
        type: string

env:
  # Normalise the ref so both push and workflow_dispatch use the same variable.
  # For push: github.ref_name = "v1.0.0-alpha.8"
  # For workflow_dispatch: inputs.tag = "v1.0.0-alpha.8"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Gate: every CI check must pass before any publish job runs. We re-run the
  # tests here rather than depending on the CI workflow because tag pushes are
  # the moment of truth — fresh runner, fresh checkout, no inherited state.
  # ──────────────────────────────────────────────────────────────────────────
  gate-tests:
    name: Gate — all tests must pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Go
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...
      - name: go mod tidy must be clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      # Testvector determinism — proves fixtures regenerate byte-identical
      - name: regenerate fixtures
        run: go run ./cmd/ratify-testvectors -out /tmp/regen
      - name: diff fixtures
        run: diff -rq testvectors/v1/ /tmp/regen/

      # Release metadata sync — every SDK version + lock matches
      - name: release-sync
        run: ./scripts/check-release-sync.sh

      # TypeScript
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: TS install
        working-directory: sdks/typescript
        run: npm install --no-audit --no-fund
      - name: TS typecheck
        working-directory: sdks/typescript
        run: npx tsc --noEmit
      - name: TS full test suite (101 tests)
        working-directory: sdks/typescript
        run: npm test

      # Python
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Python install
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Python full test suite (102 tests)
        working-directory: sdks/python
        run: pytest -v

      # Rust
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
      - name: Rust build
        working-directory: sdks/rust
        run: cargo build --all-targets --release
      - name: Rust conformance (59 fixtures)
        working-directory: sdks/rust
        run: cargo test --release

      # C / C++
      - name: C/C++ build
        working-directory: sdks/c
        run: cargo build --all-targets
      - name: C/C++ conformance (59 fixtures)
        working-directory: sdks/c
        run: cargo test --test conformance -- --nocapture
      - name: C/C++ API tests
        working-directory: sdks/c
        run: cargo test --test api

      # Tag ↔ SDK version coherence: the pushed tag must match every SDK's
      # declared version. The release-sync script already proves cross-SDK
      # alignment; here we prove the tag matches that aligned version.
      - name: tag matches SDK versions
        run: |
          set -eu
          tag="$RELEASE_TAG"          # e.g. v1.0.0-alpha.6
          tag_clean="${tag#v}"                     # 1.0.0-alpha.6
          rust_version=$(grep -E '^version = "' sdks/rust/Cargo.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          ts_version=$(node -p "require('./sdks/typescript/package.json').version")
          py_version=$(grep -E '^version = "' sdks/python/pyproject.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          # Python uses PEP 440 form (1.0.0a6) — accept either form.
          py_clean_from_tag=$(echo "$tag_clean" | sed -E 's/-alpha\.([0-9]+)/a\1/; s/-beta\.([0-9]+)/b\1/; s/-rc\.([0-9]+)/rc\1/')
          [ "$rust_version" = "$tag_clean" ] || { echo "::error::tag $tag_clean ≠ rust $rust_version"; exit 1; }
          [ "$ts_version"   = "$tag_clean" ] || { echo "::error::tag $tag_clean ≠ ts $ts_version"; exit 1; }
          [ "$py_version"   = "$py_clean_from_tag" ] || { echo "::error::tag pep440 $py_clean_from_tag ≠ py $py_version"; exit 1; }
          echo "✓ tag $tag matches all SDK versions"

  # ──────────────────────────────────────────────────────────────────────────
  # PyPI — Trusted Publisher (OIDC). No long-lived secret. Requires that the
  # 'pypi-publish' environment exist on the repo and that PyPI is configured
  # with this repo + workflow as a trusted publisher for the project. See
  # docs/REGISTRY_SETUP.md for the one-time PyPI UI steps.
  # ──────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: gate-tests
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish
      url: https://pypi.org/project/ratify-protocol/
    permissions:
      id-token: write  # required for OIDC exchange with PyPI
      contents: read   # required by actions/checkout to read the repo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: build sdist + wheel
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -lh dist/
      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
          # Skip-existing tolerates the same-version re-run case (e.g.
          # workflow re-triggered after a partial failure). PyPI rejects
          # actual version conflicts independently.
          skip-existing: true

  # ──────────────────────────────────────────────────────────────────────────
  # crates.io — token-based (cargo doesn't yet support OIDC). Token stored as
  # a repo secret. Token should be scoped to publish-update for the
  # 'ratify-protocol' crate; see docs/REGISTRY_SETUP.md.
  # ──────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: gate-tests
    runs-on: ubuntu-latest
    environment:
      name: crates-publish
      url: https://crates.io/crates/ratify-protocol
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
      - name: cargo publish (dry-run sanity)
        working-directory: sdks/rust
        run: cargo publish --dry-run
      - name: cargo publish
        working-directory: sdks/rust
        # cargo publish exits 101 if the version already exists on crates.io
        # (e.g. published locally before CI ran). Treat that as success so
        # a re-triggered workflow doesn't block the rest of the release.
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN" || { code=$?; [ $code -eq 101 ] && echo "already published — ok" || exit $code; }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # npm — Trusted Publisher (OIDC). No long-lived secret. The npm package is
  # configured with this repo + workflow as a trusted publisher; authentication
  # is handled via the OIDC token exchange, not NPM_TOKEN. The NPM_PUBLISH_ENABLED
  # variable acts as an emergency off-switch if needed.
  # ──────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: gate-tests
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@identities-ai/ratify-protocol
    permissions:
      contents: read
      id-token: write  # required for OIDC exchange with npm Trusted Publisher
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sdks/typescript/package-lock.json
          # No registry-url here — that would write a token-based .npmrc entry
          # that conflicts with OIDC Automated Publishing. The OIDC token from
          # id-token: write is exchanged directly by npm publish --provenance.
      - name: install
        working-directory: sdks/typescript
        run: npm install --no-audit --no-fund
      - name: build
        working-directory: sdks/typescript
        run: npm run build
      - name: publish (with provenance)
        working-directory: sdks/typescript
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Skip gracefully if this version is already published (re-run safety).
          # The normal publish path uses --tag latest, so if we're skipping an
          # already-published version, latest was already set correctly.
          if npm view "@identities-ai/ratify-protocol@${VERSION}" version 2>/dev/null | grep -qF "$VERSION"; then
            echo "Version ${VERSION} already published — skipping."
            exit 0
          fi
          # Publish with --tag latest in a single OIDC-authenticated command.
          # Pre-release versions get tagged latest so
          # 'npm install @identities-ai/ratify-protocol' always resolves to
          # the newest published version. Stable 1.0.0 will naturally become
          # latest when it ships.
          npm publish --access public --provenance --tag latest

  # ──────────────────────────────────────────────────────────────────────────
  # Go: nothing to do. Tag push + pkg.go.dev auto-discovery handle it.
  # This job exists as a tracking marker in the workflow graph so the
  # release summary tells you Go is "ready" rather than "missing".
  # ──────────────────────────────────────────────────────────────────────────
  publish-go:
    name: Publish Go (auto via pkg.go.dev)
    needs: gate-tests
    runs-on: ubuntu-latest
    steps:
      - name: trigger pkg.go.dev index refresh
        # Fetching the module against the new tag is the documented way to
        # prompt pkg.go.dev to index the version sooner. Failures here are
        # non-fatal — pkg.go.dev will pick it up eventually either way.
        continue-on-error: true
        run: |
          tag="$RELEASE_TAG"
          curl -fsSL "https://proxy.golang.org/github.com/identities-ai/ratify-protocol/@v/${tag}.info" || true

  # ──────────────────────────────────────────────────────────────────────────
  # Pre-built C/C++ libraries — cross-compile for common targets and upload
  # as artifacts so github-release can attach them. Consumers can link
  # against libratify_c.a without installing the Rust toolchain.
  # ──────────────────────────────────────────────────────────────────────────
  build-c-binaries:
    name: C/C++ library (${{ matrix.archive }})
    needs: [gate-tests]
    if: needs.gate-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,      os: ubuntu-latest,  cross: false, archive: linux-x86_64   }
          - { target: aarch64-unknown-linux-gnu,     os: ubuntu-latest,  cross: true,  archive: linux-aarch64  }
          - { target: armv7-unknown-linux-gnueabihf, os: ubuntu-latest,  cross: true,  archive: linux-armv7    }
          - { target: x86_64-apple-darwin,           os: macos-latest,   cross: false, archive: macos-x86_64   }
          - { target: aarch64-apple-darwin,          os: macos-latest,   cross: false, archive: macos-aarch64  }
          - { target: x86_64-pc-windows-msvc,        os: windows-latest, cross: false, archive: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        working-directory: sdks/c
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        working-directory: sdks/c
        shell: bash
        env:
          ARCHIVE_NAME: ratify-c-${{ env.RELEASE_TAG }}-${{ matrix.archive }}
        run: |
          mkdir -p "dist/${ARCHIVE_NAME}/lib" "dist/${ARCHIVE_NAME}/include"
          cp include/ratify.h "dist/${ARCHIVE_NAME}/include/"
          target_dir="target/${{ matrix.target }}/release"
          for ext in a so dylib dll lib; do
            [ -f "${target_dir}/libratify_c.${ext}" ] && cp "${target_dir}/libratify_c.${ext}" "dist/${ARCHIVE_NAME}/lib/" || true
            [ -f "${target_dir}/ratify_c.${ext}" ]    && cp "${target_dir}/ratify_c.${ext}"    "dist/${ARCHIVE_NAME}/lib/" || true
          done
          cd dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}/"
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
            echo "ARCHIVE_FILE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: c-lib-${{ matrix.archive }}
          path: sdks/c/dist/${{ env.ARCHIVE_FILE }}
          retention-days: 1

  # GitHub Release — last so it only appears once registry publishes have
  # been attempted. Attaches the testvectors/v1 bundle and pre-built C
  # libraries as release assets.
  # ──────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [gate-tests, publish-pypi, publish-crates, publish-npm, publish-go, build-c-binaries]
    if: always() && needs.gate-tests.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download C library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: c-lib-*
          path: c-artifacts/
          merge-multiple: true
      - name: bundle testvectors
        run: |
          tag="$RELEASE_TAG"
          tar -czf "ratify-testvectors-${tag}.tar.gz" testvectors/
          ls -lh ratify-testvectors-*.tar.gz
          ls -lh c-artifacts/ || true
      - name: compute install snippets for release notes
        # GitHub Release notes are static strings. Pre-compute the per-language
        # version forms here so the notes don't ask end users to run shell
        # substitutions like `$(node -p "...")` from a copy-paste.
        run: |
          tag="$RELEASE_TAG"          # v1.0.0-alpha.7
          tag_clean="${tag#v}"                     # 1.0.0-alpha.7
          py_version=$(echo "$tag_clean" | sed -E 's/-alpha\.([0-9]+)/a\1/; s/-beta\.([0-9]+)/b\1/; s/-rc\.([0-9]+)/rc\1/')
          {
            echo "TAG=$tag"
            echo "TAG_CLEAN=$tag_clean"
            echo "PY_VERSION=$py_version"
          } >> "$GITHUB_ENV"
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}   # required for workflow_dispatch (no tag in ref)
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
          files: |
            ratify-testvectors-*.tar.gz
            c-artifacts/*
          body: |
            ## Ratify Protocol ${{ env.RELEASE_TAG }}

            Open cryptographic trust protocol for AI agent authorization. Hybrid Ed25519 + ML-DSA-65 (NIST FIPS 204), quantum-safe by design. 59 canonical conformance fixtures, byte-for-byte interoperable across Go, TypeScript, Python, Rust, and C/C++.

            ### Install

            ```bash
            # Go
            go get github.com/identities-ai/ratify-protocol@${{ env.TAG }}

            # Python
            pip install ratify-protocol==${{ env.PY_VERSION }}

            # Rust
            cargo add ratify-protocol@${{ env.TAG_CLEAN }}

            # TypeScript
            npm install @identities-ai/ratify-protocol@${{ env.TAG_CLEAN }}

            # C/C++ — download pre-built archive above (no Rust required)
            # or build from source: cd sdks/c && cargo build --release
            ```

            ### Links

            - Full developer documentation: [docs.identities.ai](https://docs.identities.ai)
            - Normative specification: [SPEC.md](https://github.com/identities-ai/ratify-protocol/blob/main/SPEC.md)
            - Threat model: [docs/EXPLAINED.md](https://github.com/identities-ai/ratify-protocol/blob/main/docs/EXPLAINED.md)
            - Conformance fixtures: bundled as `ratify-testvectors-${{ env.TAG }}.tar.gz` below

            ### Legal

            - **Trademark:** Ratify Protocol™ and identities.ai™ are trademarks of Identities AI, Inc.
            - **Patent:** U.S. patent application pending.
            - **License:** Apache-2.0 (code) · CC-BY-4.0 (specification); see [docs/LICENSES.md](https://github.com/identities-ai/ratify-protocol/blob/main/docs/LICENSES.md).
