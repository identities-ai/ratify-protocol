<svg xmlns="http://www.w3.org/2000/svg" width="210" height="30" viewBox="0 0 210 30" role="img" aria-label="Powered by Ratify Protocol">
  <title>Powered by Ratify Protocol</title>
  <!-- Background -->
  <rect width="210" height="30" rx="6" fill="#0f172a"/>
  <rect x="0.5" y="0.5" width="209" height="29" rx="5.5" fill="none" stroke="#1e293b"/>
  <!-- Icon area: small "R" monogram in brand color -->
  <rect x="7" y="7" width="16" height="16" rx="3" fill="#38bdf8" fill-opacity="0.15"/>
  <text x="11.5" y="19" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#38bdf8">R</text>
  <!-- "Powered by" label -->
  <text x="30" y="19.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#64748b">Powered by</text>
  <!-- "Ratify Protocol" name -->
  <text x="98" y="19.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="600" fill="#e2e8f0">Ratify Protocol</text>
</svg>
