<svg xmlns="http://www.w3.org/2000/svg" width="216" height="30" viewBox="0 0 216 30" role="img" aria-label="Verified by Ratify Protocol">
  <title>Verified by Ratify Protocol</title>
  <!-- Background -->
  <rect width="216" height="30" rx="6" fill="#0f172a"/>
  <rect x="0.5" y="0.5" width="215" height="29" rx="5.5" fill="none" stroke="#1e293b"/>
  <!-- Icon area -->
  <rect x="7" y="7" width="16" height="16" rx="3" fill="#38bdf8" fill-opacity="0.15"/>
  <!-- Checkmark -->
  <polyline points="10.5,15 13.5,18 19.5,12" fill="none" stroke="#38bdf8" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "Verified by" label -->
  <text x="30" y="19.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#64748b">Verified by</text>
  <!-- "Ratify Protocol" name -->
  <text x="95" y="19.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="600" fill="#e2e8f0">Ratify Protocol</text>
</svg>
