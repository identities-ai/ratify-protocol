# cbindgen configuration for ratify-c
# Generates include/ratify.h from the extern "C" functions in src/lib.rs

language = "C"
include_guard = "RATIFY_H"
autogen_warning = "/* DO NOT EDIT — generated by cbindgen from sdks/c/src/lib.rs */"

header = """
/*
 * Ratify Protocol — C/C++ bindings
 * Version: 1.0.0-alpha.13
 *
 * Cryptographic authorization for AI agents.
 * Hybrid Ed25519 + ML-DSA-65 (NIST FIPS 204).
 *
 * Apache-2.0 License — https://github.com/identities-ai/ratify-protocol
 * Documentation      — https://docs.identities.ai
 */
"""

tab_width = 4
documentation_style = "c99"

# Emit extern "C" { ... } guards so the header works in C++ without changes.
cpp_compat = true

[export]
# Types are already prefixed with Ratify* in Rust — no additional prefix needed.

[parse]
parse_deps = false
